<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | ONG SJPA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">ONG SJPA</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-semibold">
                    <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="adocao.html">Adoção</a></li>
                    <li class="nav-item"><a class="nav-link" href="doacoes.html">Doações</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contato.html">Contato</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5 flex-grow-1">
        <div class="text-center mb-5">
            <h1 class="fw-bold">Fale Conosco</h1>
            <p class="text-muted">Tem dúvidas ou quer ser voluntário? Envie uma mensagem!</p>
        </div>

        <div class="row g-5">
            <!-- Informações -->
            <div class="col-md-5">
                <h3 class="fw-bold mb-4">Nossos Contatos</h3>
                <p><strong>Endereço:</strong><br></p>
                <p><strong>E-mail:</strong><br></p>
                <p><strong>Telefone/WhatsApp:</strong><br></p>
            </div>

            <!-- Formulário -->
            <div class="col-md-7">
                <div class="card shadow-sm border-0 p-4">
                    <form id="form-contato" action="#" method="POST">
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" id="nome" name="nome" required placeholder="Seu nome">
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="email" name="email" required placeholder="seu@email.com">
                        </div>

                        <div class="mb-3">
                            <label for="assunto" class="form-label">Assunto</label>
                            <select class="form-select" id="assunto" name="assunto" required>
                                <option value="">Selecione um assunto...</option>
                                <option value="adocao">Dúvida sobre adoção</option>
                                <option value="voluntariado">Quero ser voluntário</option>
                                <option value="doacao">Informações sobre doações</option>
                                <option value="outro">Outros</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="mensagem" class="form-label">Mensagem</label>
                            <textarea class="form-control" id="mensagem" name="mensagem" rows="4" required placeholder="Escreva sua mensagem..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Enviar Mensagem</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <p class="mb-0">&copy; 2026 ONG SJPA. Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
